<!doctype html>
<html lang="ru">
<head>
	<meta charset="utf-8">
	<title>Effective AI 2026</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet">
	<style>
		:root {
			--bg: #f7f5f2;
			--ink: #2d2a26;
			--muted: #8a857d;
			--subtle: #b5b0a8;
			--accent: #9d4a30;
			--content-x: 112px;
			--margin-edge: 48px;
			--content-top: 80px;
			--content-bottom: 64px;
			--corner-width: 200px;
		}

		* { margin: 0; padding: 0; box-sizing: border-box; }

		body {
			font-family: 'IBM Plex Mono', monospace;
			background: var(--bg);
			color: var(--ink);
			height: 100vh;
			overflow: hidden;
		}

		/* Slide frame — 960×700 centered like Reveal.js */
		.slide {
			position: absolute;
			width: 960px;
			height: 700px;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%) scale(var(--scale, 1));
			transform-origin: center center;
		}

		/* Corner marks */
		.slide-margins {
			position: absolute;
			inset: 0;
			pointer-events: none;
			z-index: 30;
		}

		.slide-corner-tl,
		.slide-corner-tr,
		.slide-corner-bl,
		.slide-corner-br {
			position: absolute;
			font-size: 10px;
			line-height: 1.3;
			color: var(--subtle);
			max-width: var(--corner-width);
		}

		.slide-corner-tl { top: var(--margin-edge); left: var(--content-x); text-align: left; }
		.slide-corner-tr { top: var(--margin-edge); right: var(--content-x); text-align: right; }
		.slide-corner-bl { bottom: var(--margin-edge); left: var(--content-x); text-align: left; }
		.slide-corner-br { bottom: var(--margin-edge); right: var(--content-x); text-align: right; }

		/* Slide header */
		.slide-header {
			position: absolute;
			top: var(--margin-edge);
			left: var(--content-x);
			z-index: 5;
			pointer-events: none;
		}

		.slide-header-title {
			font-size: 16px;
			font-weight: 500;
			color: var(--ink);
			line-height: 1.2;
		}

		/* Content area */
		.slide-single {
			display: flex;
			flex-direction: column;
			width: 100%;
			height: 100%;
			padding: var(--content-top) var(--content-x) var(--content-bottom);
			box-sizing: border-box;
			justify-content: center;
			align-items: center;
		}

		/* TOC */
		.toc {
			text-align: left;
		}

		.toc-item {
			display: flex;
			align-items: baseline;
			margin-bottom: 0.6em;
			font-size: 14px;
		}

		.toc-item:last-child {
			margin-bottom: 0;
		}

		.toc-title {
			text-align: right;
			width: 280px;
			color: var(--ink);
		}

		.toc-page {
			margin-left: 1.5em;
			color: var(--muted);
		}

		/* Links */
		.toc-item a {
			text-decoration: none;
			color: inherit;
			transition: color 0.15s ease;
		}

		.toc-item a:hover {
			color: var(--accent);
		}

		/* Mobile */
		@media (max-width: 1024px) {
			body {
				height: auto;
				overflow: auto;
				display: flex;
				justify-content: center;
				padding: 48px 24px;
			}

			.slide {
				position: static;
				width: 100%;
				height: auto;
				transform: none;
			}

			.slide-margins { display: none; }
			.slide-header { display: none; }

			.slide-single {
				padding: 0;
				align-items: flex-start;
			}

			.toc-item {
				flex-direction: column;
				margin-bottom: 1.2em;
			}

			.toc-title {
				text-align: left;
				width: auto;
				font-size: 16px;
			}

			.toc-page {
				margin-left: 0;
				font-size: 12px;
			}
		}
	</style>
</head>
<body>
	<div class="slide">
		<div class="slide-margins">
			<div class="slide-corner-tl"></div>
			<div class="slide-corner-tr">Effective AI 2026</div>
			<div class="slide-corner-bl"></div>
			<div class="slide-corner-br"></div>
		</div>

		<div class="slide-header">
			<div class="slide-header-title">Занятия</div>
		</div>

		<div class="slide-single">
			<div class="toc">
				<div class="toc-item">
					<a class="toc-title" href="01-intro.html">О чём курс?</a>
					<span class="toc-page">4 февраля</span>
				</div>
				<div class="toc-item">
					<a class="toc-title" href="02-simulator.html">Симулятор</a>
					<span class="toc-page">11 февраля</span>
				</div>
				<div class="toc-item">
					<a class="toc-title" href="03-integers.html">Целые числа</a>
					<span class="toc-page">18 февраля</span>
				</div>
			</div>
		</div>
	</div>

	<script>
		function fitSlide() {
			var slide = document.querySelector('.slide');
			if (window.innerWidth <= 1024) {
				slide.style.setProperty('--scale', 1);
				return;
			}
			var sx = window.innerWidth / 960;
			var sy = window.innerHeight / 700;
			slide.style.setProperty('--scale', Math.min(sx, sy, 1.5));
		}
		fitSlide();
		window.addEventListener('resize', fitSlide);
	</script>
</body>
</html>
